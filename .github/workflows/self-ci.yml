# self-CI — ultra-waterfall 저장소 자신의 품질 게이트.
# 이 저장소가 "배포하는" 강제 스크립트(uw-gate, check-gates.sh, hooks)가 실제로
# 동작·강제하는지 PR마다 검증한다. (적용 대상 저장소의 merge 게이트인 uw-gate.yml과는 별개.)
name: self-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: POSIX 구문 검사 (sh -n, 하드 게이트)
        run: |
          set -eu
          rc=0
          for f in \
            src/templates/.ultra-waterfall/bin/uw-gate \
            src/templates/.ultra-waterfall/gate/check-gates.sh \
            src/templates/.ultra-waterfall/hooks/pre-commit \
            src/templates/.ultra-waterfall/hooks/pre-push \
            src/templates/.ultra-waterfall/hooks/claude-guard.sh \
            test/e2e-gates.sh \
            test/e2e-lifecycle.sh \
            test/e2e-verifier.sh \
            test/live-verifier-smoke.sh \
            src/docs/example/verify/ac1.sh \
            src/docs/example/verify/ac1.mutant.sh; do
            if sh -n "$f"; then echo "ok   - sh -n $f"; else echo "FAIL - sh -n $f"; rc=1; fi
          done
          exit $rc

      - name: shellcheck (실오류만 — severity=error)
        run: |
          set -eu
          # 강제 스크립트는 set -f 가드 하의 의도적 word-splitting(SC2086 등)을 쓴다.
          # 스타일/info가 아니라 실제 오류(parse/정의 오류 등)만 게이트한다.
          shellcheck --shell=sh --severity=error \
            src/templates/.ultra-waterfall/bin/uw-gate \
            src/templates/.ultra-waterfall/gate/check-gates.sh \
            src/templates/.ultra-waterfall/hooks/pre-commit \
            src/templates/.ultra-waterfall/hooks/pre-push \
            src/templates/.ultra-waterfall/hooks/claude-guard.sh \
            test/e2e-gates.sh \
            test/e2e-lifecycle.sh \
            test/e2e-verifier.sh \
            test/live-verifier-smoke.sh

      - name: Verifier Python/JSON 계약 검사
        run: |
          python3 -m py_compile src/templates/.ultra-waterfall/bin/uw-verifier
          python3 - <<'PY'
          import json, pathlib
          root = pathlib.Path("src/templates/.ultra-waterfall/verifier")
          for name in ("config.json", "config.schema.json", "decision.schema.json", "envelope.schema.json"):
              json.loads((root / name).read_text())
          json.loads(pathlib.Path("src/templates/manifest.json").read_text())
          PY

      - name: Workflow YAML parse
        run: ruby -e 'require "yaml"; %w[.github/workflows/self-ci.yml src/templates/.github/workflows/uw-gate.yml].each { |f| YAML.load_file(f) }'

      - name: 강제 레이어 e2e (격리 repo 32단언, 하드 게이트)
        run: sh test/e2e-gates.sh

      - name: Lifecycle 계약 e2e (37단언, 하드 게이트)
        run: sh test/e2e-lifecycle.sh

      - name: 교차 모델 verifier e2e (fake CLI 28단언, 하드 게이트)
        run: sh test/e2e-verifier.sh
